<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 160" width="340" height="160">

  <!-- NB Monogram -->
  <!-- N -->
  <text x="107" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="400" fill="#ffffff" text-anchor="middle">N</text>
  <!-- B -->
  <text x="175" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="400" fill="#ffffff" text-anchor="middle" dx="12">B</text>

  <!-- Bridge cables (suspension bridge silhouette) -->
  <!-- Road/base line -->
  <line x1="80" y1="90" x2="260" y2="90" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Left tower -->
  <line x1="128" y1="68" x2="128" y2="90" stroke="#c9a84c" stroke-width="2"/>
  <!-- Right tower -->
  <line x1="212" y1="68" x2="212" y2="90" stroke="#c9a84c" stroke-width="2"/>
  <!-- Left cable arc -->
  <path d="M128 72 Q170 84 212 72" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- Suspender lines left side -->
  <line x1="140" y1="77" x2="140" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <line x1="152" y1="80" x2="152" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <line x1="164" y1="82" x2="164" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <line x1="176" y1="82" x2="176" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <line x1="188" y1="80" x2="188" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <line x1="200" y1="77" x2="200" y2="90" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
  <!-- Left shore line -->
  <line x1="80" y1="90" x2="100" y2="90" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Right shore line -->
  <line x1="240" y1="90" x2="260" y2="90" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- NORTHBRIDGE -->
  <text x="170" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#ffffff" text-anchor="middle" letter-spacing="6">NORTHBRIDGE</text>

  <!-- Rules flanking tagline -->
  <line x1="52" y1="133" x2="112" y2="133" stroke="#c9a84c" stroke-width="0.75"/>
  <line x1="228" y1="133" x2="288" y2="133" stroke="#c9a84c" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="170" y="137" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#c9a84c" text-anchor="middle" letter-spacing="2.5">PROFESSIONAL IMAGES. LASTING IMPACT.</text>

</svg>
